<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Vibrant cyan to purple gradient matching NexusVoice aesthetic -->
    <linearGradient id="nvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background glassmorphism/dark disk with a border -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="#030712" stroke="url(#nvGrad)" stroke-width="4.5" />
  <!-- Futuristic N and V letters linked together -->
  <path d="M 26 70 L 26 30 L 44 58 L 44 30 M 54 30 L 64 70 L 74 30" fill="none" stroke="url(#nvGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Tiny decorative neural dot at the transition -->
  <circle cx="44" cy="58" r="3.5" fill="#a855f7" />
</svg>
